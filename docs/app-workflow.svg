<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1580" viewBox="0 0 1700 1580" role="img" aria-labelledby="title desc">
  <title id="title">MLS Price Predictor Workflow</title>
  <desc id="desc">Workflow diagram showing weekly RentCast polling, listing lifecycle tracking, AI price prediction, and terminal listing outcomes.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#274060"/>
    </marker>
    <style>
      .bg { fill: #f6f9fc; }
      .title { font: 700 38px Arial, sans-serif; fill: #17283a; }
      .subtitle { font: 400 19px Arial, sans-serif; fill: #4a6075; }
      .box { fill: #ffffff; stroke: #9cb3c9; stroke-width: 2.5; rx: 14; }
      .box-primary { fill: #e6f4f1; stroke: #21937e; stroke-width: 3; rx: 14; }
      .box-ai { fill: #f1ecff; stroke: #7662c9; stroke-width: 3; rx: 14; }
      .box-stop { fill: #fff1e8; stroke: #d47a37; stroke-width: 3; rx: 14; }
      .db { fill: #e9f1fb; stroke: #4779ad; stroke-width: 3; }
      .decision { fill: #fffbea; stroke: #c39b22; stroke-width: 3; }
      .body { font: 700 20px Arial, sans-serif; fill: #17283a; }
      .muted { font: 400 16px Arial, sans-serif; fill: #5b7187; }
      .label { font: 700 17px Arial, sans-serif; fill: #274060; }
      .arrow { stroke: #274060; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .group { fill: #ffffff; stroke: #d7e1eb; stroke-width: 2; rx: 18; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1700" height="1580"/>

  <text class="title" x="70" y="78">MLS Price Predictor App Workflow</text>
  <text class="subtitle" x="70" y="112">Weekly RentCast updates, active listing tracking, AI price prediction, and final outcome storage.</text>

  <rect class="group" x="60" y="150" width="1580" height="1370"/>

  <rect class="box-primary" x="590" y="215" width="320" height="82"/>
  <text class="body" x="750" y="251" text-anchor="middle">Weekly scheduled job</text>
  <text class="muted" x="750" y="277" text-anchor="middle">Run once per week</text>

  <rect class="box" x="590" y="345" width="320" height="92"/>
  <text class="body" x="750" y="382" text-anchor="middle">Call RentCast API</text>
  <text class="muted" x="750" y="408" text-anchor="middle">Find new and updated listings</text>

  <rect class="box" x="590" y="485" width="320" height="92"/>
  <text class="body" x="750" y="522" text-anchor="middle">Normalize payload</text>
  <text class="muted" x="750" y="548" text-anchor="middle">Map API fields to app schema</text>

  <polygon class="decision" points="750,620 920,690 750,760 580,690"/>
  <text class="body" x="750" y="684" text-anchor="middle">Already</text>
  <text class="body" x="750" y="709" text-anchor="middle">tracked?</text>

  <rect class="box" x="260" y="815" width="320" height="92"/>
  <text class="body" x="420" y="852" text-anchor="middle">Create listing record</text>
  <text class="muted" x="420" y="878" text-anchor="middle">New RentCast listing ID</text>

  <rect class="box" x="920" y="815" width="320" height="104"/>
  <text class="body" x="1080" y="852" text-anchor="middle">Update listing data</text>
  <text class="muted" x="1080" y="878" text-anchor="middle">Refresh price, status,</text>
  <text class="muted" x="1080" y="901" text-anchor="middle">sold price if available</text>

  <rect class="box-ai" x="260" y="985" width="320" height="104"/>
  <text class="body" x="420" y="1022" text-anchor="middle">Run AI prediction</text>
  <text class="muted" x="420" y="1048" text-anchor="middle">At time of weekly pull</text>
  <text class="muted" x="420" y="1071" text-anchor="middle">using current inputs</text>

  <rect class="box-ai" x="260" y="1155" width="320" height="104"/>
  <text class="body" x="420" y="1192" text-anchor="middle">Store prediction result</text>
  <text class="muted" x="420" y="1218" text-anchor="middle">Price, confidence, inputs,</text>
  <text class="muted" x="420" y="1241" text-anchor="middle">created timestamp</text>

  <ellipse class="db" cx="750" cy="1207" rx="150" ry="52"/>
  <text class="body" x="750" y="1202" text-anchor="middle">Database</text>
  <text class="muted" x="750" y="1228" text-anchor="middle">System of record</text>

  <polygon class="decision" points="1080,970 1250,1040 1080,1110 910,1040"/>
  <text class="body" x="1080" y="1022" text-anchor="middle">Active and</text>
  <text class="body" x="1080" y="1047" text-anchor="middle">under 90 days</text>
  <text class="body" x="1080" y="1072" text-anchor="middle">listed?</text>

  <polygon class="decision" points="1080,1165 1235,1225 1080,1285 925,1225"/>
  <text class="body" x="1080" y="1219" text-anchor="middle">Final</text>
  <text class="body" x="1080" y="1244" text-anchor="middle">status?</text>

  <rect class="box-stop" x="955" y="1315" width="410" height="96"/>
  <text class="body" x="1160" y="1348" text-anchor="middle">Final outcome</text>
  <text class="muted" x="1160" y="1374" text-anchor="middle">Sold, delisted, or past 90 days</text>
  <text class="muted" x="1160" y="1398" text-anchor="middle">Store sold price or final status</text>

  <rect class="box-primary" x="1035" y="1440" width="250" height="76"/>
  <text class="body" x="1160" y="1473" text-anchor="middle">Stop tracking</text>
  <text class="muted" x="1160" y="1498" text-anchor="middle">Keep history</text>

  <path class="arrow" d="M 750 297 L 750 345"/>
  <path class="arrow" d="M 750 437 L 750 485"/>
  <path class="arrow" d="M 750 577 L 750 620"/>

  <path class="arrow" d="M 580 690 L 420 690 L 420 815"/>
  <text class="label" x="490" y="672">No</text>

  <path class="arrow" d="M 920 690 L 1080 690 L 1080 815"/>
  <text class="label" x="995" y="672">Yes</text>

  <path class="arrow" d="M 420 907 L 420 985"/>
  <path class="arrow" d="M 420 1089 L 420 1155"/>
  <path class="arrow" d="M 580 1207 L 600 1207"/>

  <path class="arrow" d="M 1080 919 L 1080 970"/>

  <path class="arrow" d="M 910 1040 L 580 1040"/>
  <text class="label" x="735" y="1022">Yes</text>

  <path class="arrow" d="M 1080 1110 L 1080 1165"/>
  <text class="label" x="1098" y="1142">No</text>

  <path class="arrow" d="M 1080 1285 L 1080 1300 L 1160 1300 L 1160 1315"/>
  <path class="arrow" d="M 1160 1411 L 1160 1440"/>
</svg>
